name: Clean All Workflow Runs (One-time Cleanup)

on:
  workflow_dispatch:        # 只能手动触发，防止意外运行

jobs:
  cleanup:
    name: Delete All Previous Workflow Runs
    runs-on: ubuntu-latest
    permissions:
      actions: write        # 必须有此权限才能删除 workflow runs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Delete ALL workflow runs (except current one)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🧹 开始清理所有旧的 Workflow Runs..."

          # 获取当前运行的 ID（避免删除自己）
          CURRENT_RUN_ID=${{ github.run_id }}

          echo "当前运行 ID: $CURRENT_RUN_ID"

          # 使用 gh CLI 删除所有 workflow runs（分页处理）
          echo "正在获取并删除所有旧的 workflow runs..."

          gh run list --repo ${{ github.repository }} --limit 500 --json databaseId -q '.[].databaseId' | \
          while read -r run_id; do
            if [ "$run_id" != "$CURRENT_RUN_ID" ]; then
              echo "Deleting run ID: $run_id"
              gh run delete "$run_id" --repo ${{ github.repository }} || echo "Failed to delete $run_id (maybe already deleted)"
            else
              echo "跳过当前运行: $run_id"
            fi
          done

          echo "✅ 清理完成！Actions 历史记录已基本清空。"
          echo "注意：刷新页面后应该会看到非常干净的列表。"